name: Release WinGet installers

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: Version number (leave empty to use AppxPackageVersion from csproj)
        required: false
        type: string
      release_notes:
        description: Release notes
        required: false
        default: Quick Shell release for PowerToys Command Palette.
        type: string
      submit_winget:
        description: Open a WinGet manifest update PR after release
        required: false
        default: true
        type: boolean

env:
  DISPLAY_NAME: Quick Shell
  EXTENSION_NAME: QuickShell
  GITHUB_REPO_URL: https://github.com/tonythethompson/QuickShell
  WINGET_PACKAGE_ID: tonythethompson.QuickShell

jobs:
  build:
    runs-on: windows-2022
    permissions:
      contents: write
      actions: read
    outputs:
      version: ${{ steps.version.outputs.VERSION }}
      tag: v${{ steps.version.outputs.VERSION }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress
        shell: pwsh

      - name: Get version
        id: version
        run: |
          if ("${{ github.event_name }}" -eq "push") {
            $version = "${{ github.ref_name }}" -replace '^v', ''
          } elseif ("${{ github.event.inputs.version }}" -ne "") {
            $version = "${{ github.event.inputs.version }}"
          } else {
            $projectFile = "QuickShell/QuickShell.csproj"
            $xml = [xml](Get-Content $projectFile)
            $version = $xml.Project.PropertyGroup.AppxPackageVersion | Select-Object -First 1
            if (-not $version) { throw "AppxPackageVersion not found in $projectFile" }
          }
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT
          Write-Host "Using version: $version"
        shell: pwsh

      - name: Build EXE installers
        run: |
          Set-Location QuickShell
          .\build-exe.ps1 -Version "${{ steps.version.outputs.VERSION }}"
        shell: pwsh

      - name: Build PowerToys Run plugin (x64)
        run: .\scripts\build-run-plugin.ps1 -Platform x64
        shell: pwsh

      - name: Build PowerToys Run plugin (ARM64)
        run: .\scripts\build-run-plugin.ps1 -Platform ARM64
        shell: pwsh

      - name: Upload x64 installer
        uses: actions/upload-artifact@v4
        with:
          name: QuickShell-x64-installer
          path: QuickShell/bin/Release/installer/*-x64.exe
          if-no-files-found: error

      - name: Upload ARM64 installer
        uses: actions/upload-artifact@v4
        with:
          name: QuickShell-arm64-installer
          path: QuickShell/bin/Release/installer/*-arm64.exe
          if-no-files-found: warn

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          name: Quick Shell v${{ steps.version.outputs.VERSION }}
          generate_release_notes: true
          body: |
            ## Quick Shell v${{ steps.version.outputs.VERSION }}

            ${{ github.event.inputs.release_notes }}

            ## Install

            - **x64**: `QuickShell-Setup-${{ steps.version.outputs.VERSION }}-x64.exe`
            - **ARM64**: `QuickShell-Setup-${{ steps.version.outputs.VERSION }}-arm64.exe`

            ### PowerToys Run plugin

            - **x64**: `QuickShell.Run-x64.zip` → extract to `%LOCALAPPDATA%\Microsoft\PowerToys\PowerToys Run\Plugins\QuickShell\`
            - **ARM64**: `QuickShell.Run-ARM64.zip`

            See [docs/powertoys-run-plugin.md](https://github.com/tonythethompson/QuickShell/blob/main/docs/powertoys-run-plugin.md).

            After installing the Command Palette extension, run **Reload Command Palette Extension** in PowerToys Command Palette.

            ## WinGet

            ```powershell
            winget install ${{ env.WINGET_PACKAGE_ID }}
            ```
          files: |
            QuickShell/bin/Release/installer/*.exe
            QuickShell.Run/bin/x64/Release/QuickShell.Run-x64.zip
            QuickShell.Run/bin/ARM64/Release/QuickShell.Run-ARM64.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  winget-update:
    needs: build
    runs-on: windows-latest
    if: >-
      needs.build.result == 'success' &&
      (
        github.event_name == 'push' ||
        github.event.inputs.submit_winget != 'false'
      )

    steps:
      - name: Install WingetCreate
        run: |
          winget install --id Microsoft.WingetCreate -e `
            --accept-source-agreements --accept-package-agreements --disable-interactivity
          $env:Path = [System.Environment]::GetEnvironmentVariable('Path', 'Machine') + ';' + `
            [System.Environment]::GetEnvironmentVariable('Path', 'User')
          wingetcreate --version
        shell: pwsh

      - name: Submit WinGet manifest update
        run: |
          $env:Path = [System.Environment]::GetEnvironmentVariable('Path', 'Machine') + ';' + `
            [System.Environment]::GetEnvironmentVariable('Path', 'User')

          if (-not $env:WINGET_PAT) {
            Write-Warning "WINGET_PAT secret is not configured. Skipping WinGet submission."
            exit 0
          }

          $version = "${{ needs.build.outputs.version }}"
          $tag = "${{ needs.build.outputs.tag }}"
          $baseUrl = "https://github.com/${{ github.repository }}/releases/download/$tag"
          $x64Url = "$baseUrl/QuickShell-Setup-$version-x64.exe"
          $arm64Url = "$baseUrl/QuickShell-Setup-$version-arm64.exe"

          Write-Host "Submitting WinGet update for $version"
          Write-Host "  x64:   $x64Url"
          Write-Host "  arm64: $arm64Url"

          wingetcreate update "${{ env.WINGET_PACKAGE_ID }}" `
            --version $version `
            --urls $x64Url $arm64Url `
            --submit `
            --token $env:WINGET_PAT
        shell: pwsh
        env:
          WINGET_PAT: ${{ secrets.WINGET_PAT }}
