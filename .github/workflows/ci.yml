name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  build-test:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Build
        run: dotnet build QuickShell.sln -c Release --verbosity minimal
        shell: pwsh

      - name: Test
        run: dotnet test QuickShell.sln -c Release --no-build --verbosity minimal
        shell: pwsh
