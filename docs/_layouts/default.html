<!DOCTYPE html>
<html lang="{{ site.lang | default: 'en' }}">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% if page.title %}{{ page.title }} · {% endif %}{{ site.title }}</title>
    <meta name="description" content="{{ page.description | default: site.description }}">
    {% seo %}
    <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
  </head>
  <body>
    <header class="site-header">
      <div class="wrap">
        <a class="site-title" href="{{ '/' | relative_url }}">{{ site.title }}</a>
        <nav class="site-nav" aria-label="Main">
          {% for item in site.header_pages %}
            <a href="{{ item.url | relative_url }}"{% if page.url == item.url %} aria-current="page"{% endif %}>{{ item.title }}</a>
          {% endfor %}
          <a href="https://github.com/{{ site.repository }}">GitHub</a>
        </nav>
      </div>
    </header>

    <main class="site-main wrap">
      {{ content }}
    </main>

    <footer class="site-footer">
      <div class="wrap">
        <p>
          {{ site.title }} ·
          <a href="mailto:{{ site.author.email }}">{{ site.author.email }}</a> ·
          <a href="https://github.com/{{ site.repository }}/issues">Issues</a> ·
          <a href="{{ '/privacy/' | relative_url }}">Privacy</a>
        </p>
        <p class="muted">MIT License · Not affiliated with Microsoft or PowerToys.</p>
      </div>
    </footer>
  </body>
</html>
