<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Quick Shell concept: modern prompt window">
  <title>Modern Prompt Window</title>
  <defs>
    <linearGradient id="window-bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0078D4"/>
      <stop offset="100%" stop-color="#005A9E"/>
    </linearGradient>
    <linearGradient id="window-body" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1A1F28"/>
      <stop offset="100%" stop-color="#12151C"/>
    </linearGradient>
  </defs>

  <!-- App tile background -->
  <rect width="512" height="512" rx="96" fill="url(#window-bg)"/>

  <!-- Window -->
  <g transform="translate(88 104)">
    <rect width="336" height="304" rx="28" fill="url(#window-body)" stroke="#FFFFFF" stroke-opacity="0.18" stroke-width="4"/>
    <rect width="336" height="56" rx="28" fill="#FFFFFF" fill-opacity="0.08"/>
    <rect y="44" width="336" height="12" fill="url(#window-body)"/>

    <!-- Traffic dots -->
    <circle cx="36" cy="28" r="8" fill="#FF5F57"/>
    <circle cx="64" cy="28" r="8" fill="#FFBD2E"/>
    <circle cx="92" cy="28" r="8" fill="#28CA41"/>

    <!-- Prompt -->
    <text x="48" y="210" fill="#FFFFFF" font-family="Consolas, 'Courier New', monospace" font-size="88" font-weight="700">&gt;</text>
    <rect x="148" y="168" width="20" height="64" rx="4" fill="#4EC9B0"/>
    <rect x="188" y="196" width="96" height="12" rx="4" fill="#FFFFFF" fill-opacity="0.25"/>
  </g>
</svg>
