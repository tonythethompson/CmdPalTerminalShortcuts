<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Quick Shell concept: lightning prompt">
  <title>Lightning Prompt</title>
  <defs>
    <linearGradient id="lightning-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#141820"/>
      <stop offset="100%" stop-color="#0a0c10"/>
    </linearGradient>
    <linearGradient id="bolt-fill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFB347"/>
      <stop offset="100%" stop-color="#FF8C00"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#lightning-bg)"/>

  <!-- Terminal frame -->
  <rect x="96" y="96" width="320" height="320" rx="36" fill="#1E222A" stroke="#3A4150" stroke-width="8"/>
  <rect x="128" y="128" width="120" height="12" rx="6" fill="#3A4150" opacity="0.7"/>

  <!-- Prompt caret -->
  <path d="M148 300 L148 220 L228 260 L148 300 Z" fill="#E8EAED"/>

  <!-- Underscore cursor -->
  <rect x="244" y="278" width="72" height="14" rx="4" fill="#4EC9B0"/>

  <!-- Lightning bolt (speed) -->
  <path fill="url(#bolt-fill)" d="M292 156 L256 236 L288 236 L268 316 L348 228 L312 228 L332 156 Z"/>
</svg>
