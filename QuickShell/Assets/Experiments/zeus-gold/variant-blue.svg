<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Experimental: blue folder with Zeus lightning bolt" shape-rendering="geometricPrecision">
  <title>Zeus Blue Folder Experiment</title>

  <defs>
    <radialGradient id="bgDepth" cx="48%" cy="42%" r="72%">
      <stop offset="0%" stop-color="#262A33"/>
      <stop offset="100%" stop-color="#181C24"/>
    </radialGradient>

    <linearGradient id="folderBack" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1B7BBF"/>
      <stop offset="100%" stop-color="#0E5F96"/>
    </linearGradient>

    <linearGradient id="folderFront" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#45A8F0"/>
      <stop offset="100%" stop-color="#2F96E8"/>
    </linearGradient>

    <linearGradient id="boltFill" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
    </linearGradient>

    <linearGradient id="boltOutline" x1="38%" y1="0%" x2="62%" y2="100%">
      <stop offset="0%" stop-color="#B8EEFF"/>
      <stop offset="45%" stop-color="#44BBFF"/>
      <stop offset="100%" stop-color="#1188EE"/>
    </linearGradient>

    <linearGradient id="glassShine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.26"/>
      <stop offset="42%" stop-color="#FFFFFF" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="glassRim" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.28"/>
      <stop offset="45%" stop-color="#FFFFFF" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.12"/>
    </linearGradient>

    <radialGradient id="glassDepth" cx="50%" cy="88%" r="62%">
      <stop offset="0%" stop-color="#0E1520" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#0E1520" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="512" height="512" rx="64" fill="url(#bgDepth)"/>
  <rect width="512" height="512" rx="64" fill="url(#glassDepth)"/>
  <rect width="512" height="512" rx="64" fill="url(#glassShine)"/>
  <rect width="512" height="512" rx="64" fill="none" stroke="url(#glassRim)" stroke-width="2.5"/>

  <g transform="translate(256 282) scale(12.4) translate(-16 -16)">
    <path fill="url(#folderBack)" d="M26,27H6c-1.105,0-2-0.895-2-2V7c0-1.105,0.895-2,2-2h4.027c0.623,0,1.22,0.247,1.66,0.688l0.624,0.624C12.753,6.753,13.35,7,13.973,7H26c1.105,0,2,0.895,2,2v16C28,26.105,27.105,27,26,27z"/>
    <path fill="url(#folderFront)" d="M27,27H5c-1.105,0-2-0.895-2-2V11c0-1.105,0.895-2,2-2h22c1.105,0,2,0.895,2,2v14C29,26.105,28.105,27,27,27z"/>
  </g>

